<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עולם הפרצופים - המאגר המושלם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f1f5f9;
        }
        .kaomoji-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
            background: white;
            min-height: 90px;
        }
        .kaomoji-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(79, 70, 229, 0.15);
            border-color: #4f46e5;
            background-color: #f8fafc;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
            bottom: 3rem;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 pb-24">

    <!-- Header -->
    <header class="max-w-5xl mx-auto text-center mb-10">
        <h1 class="text-5xl font-black text-slate-900 mb-4">◮◡◭ ה-Kaomoji המורחב ◪◡◪</h1>
        <p class="text-lg text-slate-600">הוספנו עוד מאות פרצופים מעוצבים - הכל טקסט נקי!</p>
    </header>

    <!-- Navigation -->
    <nav class="max-w-6xl mx-auto mb-8 sticky top-4 z-40 bg-white/90 backdrop-blur-md p-4 rounded-3xl shadow-xl border border-slate-200">
        <div class="flex flex-wrap justify-center gap-2 mb-4" id="filters">
            <button onclick="filterItems('all', this)" class="btn-filter px-5 py-2 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg transition">הכל</button>
            <button onclick="filterItems('simple', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">פשוטים ◕‿◕</button>
            <button onclick="filterItems('cute', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">חמודים (◡‿◡✿)</button>
            <button onclick="filterItems('cool', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">קול ⌐■_■</button>
            <button onclick="filterItems('funny', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">מצחיקים (o^▽^o)</button>
            <button onclick="filterItems('geometry', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">גיאומטרי ◗◡◖</button>
            <button onclick="filterItems('action', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">פעולה ᕙ(⇀‸↼)ᕗ</button>
        </div>
        
        <div class="relative max-w-xl mx-auto">
            <input type="text" id="searchInput" oninput="search()" placeholder="חפש פרצוף (למשל: שמח, כועס...)" class="w-full px-6 py-4 pr-12 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:outline-none transition text-xl">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">🔍</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-2 mb-6 flex justify-between items-center">
        <span class="text-slate-500">נמצאו <b id="count" class="text-indigo-600">0</b> פרצופים מדהימים</span>
    </div>

    <!-- Grid -->
    <main id="grid" class="max-w-7xl mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <!-- JS builds cards here -->
    </main>

    <div id="toast" class="toast">הועתק בהצלחה! ✓</div>

    <script>
        const symbols = {
            eyes: ["◕", "◔", "◖", "◗", "◮", "◪", "⊙", "⚆", "๏", "°", "•", "·", "⍤", "⍥", "⍨", "ᵔ", "¬", "◑", "◐", "ಠ", "Θ", "O", "o", "♥", "◊", "◘", "◙", "◡", "◠", "◒", "◓", "ↀ", "ↁ", "ↂ", "≖", "≗", "⪧", "⪦", "⪩", "⪨"],
            mouths: ["◡", "‿", "▿", " ", "_", "ω", "﹏", "‸", "Δ", "▽", "ᴥ", "v", "V", "o", "O", "☐", "皿", "ㅅ", "꒳", "A", "エ", "ㅂ", "ᗨ", "ᗝ", "ᗣ"],
            decor: ["✿", "☆", "★", "✧", "✦", "†", "‡", "⋆", "⌛", "☕", "⚓", "⚡", "☘", "⚘", "⚜", "⚔", "🛡", "⚖"],
            brackets: [["(", ")"], ["[", "]"], ["{", "}"], ["<", ">"], ["⤜", "⤏"], ["ᕙ", "ᕗ"], ["ᕦ", "ᕤ"], ["༼", "༽"], ["ʕ", "ʔ"], ["(๑", "๑)"], ["(つ", "つ)"], ["(づ", "づ)"], ["(ﾉ", " )ﾉ"], ["(づ◡﹏◡)", ""]]
        };

        const handPickedData = [
            // SIMPLE (No brackets)
            { text: "◕‿◕", category: "simple" }, { text: "◮◡◭", category: "simple" }, { text: "◪◡◪", category: "simple" },
            { text: "◖◡◗", category: "simple" }, { text: "⊙◡⊙", category: "simple" }, { text: "⚆◡⚆", category: "simple" },
            { text: "°◡°", category: "simple" }, { text: "•◡•", category: "simple" }, { text: "·◡·", category: "simple" },
            { text: "◔◡◔", category: "simple" }, { text: "ᵔ◡ᵔ", category: "simple" }, { text: "¬‿¬", category: "simple" },
            { text: "◑◡◐", category: "simple" }, { text: "๏◡๏", category: "simple" }, { text: "⍤◡⍤", category: "simple" },
            { text: "≖◡≖", category: "simple" }, { text: "≗◡≗", category: "simple" }, { text: "⪧◡⪦", category: "simple" },
            { text: "X◡X", category: "simple" }, { text: "U◡U", category: "simple" }, { text: "V◡V", category: "simple" },

            // CUTE
            { text: "(◡‿◡✿)", category: "cute" }, { text: "(◕‿◕✿)", category: "cute" }, { text: "(っ˘ڡ˘ς)", category: "cute" },
            { text: "(´｡• ᵕ •｡`)", category: "cute" }, { text: "(｡♥‿♥｡)", category: "cute" }, { text: "(✿◠‿◠)", category: "cute" },
            { text: "(*^‿^*)", category: "cute" }, { text: "(⌒‿⌒)", category: "cute" }, { text: "(.❛ ᴗ ❛.)", category: "cute" },
            { text: "(◕‿◕)", category: "cute" }, { text: "٩(◕‿◕)۶", category: "cute" }, { text: " ( ◡_◡ )", category: "cute" },
            { text: " (o˘◡˘o)", category: "cute" }, { text: " (´꒳`)", category: "cute" }, { text: " (´• ω •`)", category: "cute" },
            
            // COOL / PRO
            { text: "⌐■_■", category: "cool" }, { text: "(⌐■◡■)", category: "cool" }, { text: "(-_■)", category: "cool" },
            { text: "( •_•)>⌐■-■", category: "cool" }, { text: "( ≖‿  ≖)", category: "cool" }, { text: "(￣▽￣)ノ", category: "cool" },
            { text: " (─‿‿─)", category: "cool" }, { text: " (¬‿¬)", category: "cool" }, { text: " (⇀‸↼‶)", category: "cool" },

            // FUNNY / CRAZY
            { text: "(o^▽^o)", category: "funny" }, { text: "(≧◡≦)", category: "funny" }, { text: "(☆▽☆)", category: "funny" },
            { text: "ヽ(>∀<)ﾉ", category: "funny" }, { text: "(´ ∀ ` *)", category: "funny" }, { text: "٩(ˊᗜˋ*)ו", category: "funny" },
            { text: " (＠_＠)", category: "funny" }, { text: " (⊙_⊙)", category: "funny" }, { text: " (o_O)", category: "funny" },
            { text: " (ﾟДﾟ)", category: "funny" }, { text: " (・∀・)", category: "funny" },
            
            // GEOMETRY
            { text: "▲◡▲", category: "geometry" }, { text: "▼◡▼", category: "geometry" }, { text: "◆◡◆", category: "geometry" },
            { text: "◉◡◉", category: "geometry" }, { text: "◙◡◙", category: "geometry" }, { text: "◘◡◘", category: "geometry" },
            
            // ACTION
            { text: "ᕙ(⇀‸↼)ᕗ", category: "action" }, { text: "ᕙ(`▿´)ᕗ", category: "action" }, { text: "ᕕ( ᐛ )ᕗ", category: "action" },
            { text: "(╯°□°）╯︵ ┻━┻", category: "action" }, { text: "┬─┬ノ( º _ ºノ)", category: "action" }, { text: " (づ◡﹏◡)づ", category: "action" },
            { text: " (ノ￣ω￣)ノ", category: "action" }, { text: " (シ. .)シ", category: "action" }, { text: " (づ ◕‿◕ )づ", category: "action" }
        ];

        let allKao = [...handPickedData];

        function generateMassive() {
            for (let i = 0; i < 700; i++) {
                const eye = symbols.eyes[Math.floor(Math.random() * symbols.eyes.length)];
                const mouth = symbols.mouths[Math.floor(Math.random() * symbols.mouths.length)];
                const bracket = symbols.brackets[Math.floor(Math.random() * symbols.brackets.length)];
                const decor = Math.random() > 0.8 ? symbols.decor[Math.floor(Math.random() * symbols.decor.length)] : "";
                
                // Decide if it's a "Simple" one (no brackets) or a standard one
                const isSimple = Math.random() > 0.7;
                
                let text;
                if (isSimple) {
                    text = `${eye}${mouth}${eye}${decor}`;
                } else {
                    const styles = [
                        `${bracket[0]}${eye}${mouth}${eye}${bracket[1]}${decor}`,
                        `${bracket[0]}${eye}_${eye}${bracket[1]}`,
                        `${bracket[0]}${eye}‸${eye}${bracket[1]}`,
                        `${bracket[0]}${eye}◡${eye}${bracket[1]}✧`
                    ];
                    text = styles[Math.floor(Math.random() * styles.length)];
                }
                
                if (!allKao.some(k => k.text === text)) {
                    let cat = isSimple ? "simple" : "geometry";
                    if (text.includes('✿') || text.includes('◡')) cat = isSimple ? "simple" : "cute";
                    else if (text.includes('ᕙ') || text.includes('ᕕ')) cat = "action";
                    
                    allKao.push({ text, category: cat });
                }
            }
        }

        generateMassive();

        function render(data) {
            const grid = document.getElementById('grid');
            const count = document.getElementById('count');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'kaomoji-card border border-slate-200 rounded-2xl p-6 flex items-center justify-center text-xl font-bold text-slate-800 shadow-sm text-center';
                card.innerText = item.text;
                card.onclick = () => {
                    const el = document.createElement('textarea');
                    el.value = item.text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 1500);
                };
                grid.appendChild(card);
            });
            count.innerText = data.length;
        }

        function filterItems(category, btn) {
            const filtered = category === 'all' ? allKao : allKao.filter(k => k.category === category);
            render(filtered);
            
            document.querySelectorAll('.btn-filter').forEach(b => {
                b.className = 'btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition';
            });
            btn.className = 'btn-filter px-5 py-2 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg transition';
        }

        function search() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allKao.filter(k => k.text.toLowerCase().includes(q) || k.category.toLowerCase().includes(q));
            render(filtered);
        }

        window.onload = () => render(allKao);
    </script>
</body>
</html>
