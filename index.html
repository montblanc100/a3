<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עולם הפרצופים - המאגר הענק והנקי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f1f5f9;
        }
        .kaomoji-card {
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
            background: white;
        }
        .kaomoji-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #4f46e5;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
            bottom: 3rem;
        }
        .count-badge {
            background: #4f46e5;
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 pb-24">

    <!-- Header -->
    <header class="max-w-5xl mx-auto text-center mb-10">
        <h1 class="text-5xl font-black text-slate-900 mb-4">◮◡◭ ה-Kaomoji-דקס ◪◡◪</h1>
        <p class="text-lg text-slate-600">מאות פרצופי טקסט נקיים ללא אימוג'ים - העתקה בלחיצה אחת</p>
    </header>

    <!-- Navigation -->
    <nav class="max-w-6xl mx-auto mb-8 sticky top-4 z-40 bg-white/90 backdrop-blur-md p-4 rounded-3xl shadow-xl border border-slate-200">
        <div class="flex flex-wrap justify-center gap-2 mb-4" id="filters">
            <button onclick="filterItems('all', this)" class="btn-filter px-5 py-2 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg transition">הכל</button>
            <button onclick="filterItems('classic', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">קלאסי ◮◡◭</button>
            <button onclick="filterItems('geometry', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">גיאומטרי ◗◡◖</button>
            <button onclick="filterItems('minimal', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">מינימלי •◡•</button>
            <button onclick="filterItems('action', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">פעולה ᕕ( ᐛ )ᕗ</button>
            <button onclick="filterItems('complex', this)" class="btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition">מורכב (づ◡﹏◡)づ</button>
        </div>
        
        <div class="relative max-w-xl mx-auto">
            <input type="text" id="searchInput" oninput="search()" placeholder="חיפוש מהיר..." class="w-full px-6 py-4 pr-12 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:outline-none transition text-xl">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">🔍</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-2 mb-6 flex justify-between items-center">
        <span class="text-slate-500">נמצאו <b id="count" class="text-indigo-600">0</b> תוצאות</span>
    </div>

    <!-- Grid -->
    <main id="grid" class="max-w-7xl mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <!-- JS builds cards here -->
    </main>

    <div id="toast" class="toast">הועתק! ✓</div>

    <script>
        const symbols = {
            eyes: ["◮", "◪", "◗", "◖", "◕", "◔", "⊙", "⚆", "๏", "°", "•", "·", "⍤", "⍥", "⍨", "ᵔ", "¬", "◑", "◐", "X", "U", "V", "ಠ", "Θ", "O", "o", "♥", "♦", "◊", "◘", "◙", "◜", "◝", "◡", "◠", "◒", "◓"],
            mouths: ["◡", "‿", "▿", " ", "_", "ω", "﹏", "‸", "Δ", "▽", "ᴥ", "◡", "‿", "v", "V", "o", "O", "☐", "▭", "口", "皿", "ㅅ", "꒳", "A"],
            arms: [["(", ")"], ["[", "]"], ["{", "}"], ["<", ">"], ["⤜", "⤏"], ["ᕙ", "ᕗ"], ["ᕦ", "ᕤ"], ["༼", "༽"], ["(づ", " )づ"], ["ᕕ(", ")ᕗ"], ["╰(", ")╯"], ["(つ", ")つ"]]
        };

        const staticData = [
            { text: "◮◡◭", category: "geometry" }, { text: "◪◡◪", category: "geometry" }, { text: "◗◡◖", category: "geometry" },
            { text: "◒◡◓", category: "geometry" }, { text: "◑◡◐", category: "geometry" }, { text: "◰◡◱", category: "geometry" },
            { text: "◕‿◕", category: "classic" }, { text: "◔̯◔", category: "classic" }, { text: "⊙﹏⊙", category: "classic" },
            { text: "⚆_⚆", category: "classic" }, { text: "๏̯๏", category: "classic" }, { text: "°◡°", category: "minimal" },
            { text: "•◡•", category: "minimal" }, { text: "·ᴗ·", category: "minimal" }, { text: "¬‿¬", category: "classic" },
            { text: "⌐■_■", category: "complex" }, { text: "(ツ)", category: "classic" }, { text: " ت ", category: "minimal" },
            { text: "ᕙ⇀↼ᕗ", category: "action" }, { text: "ᕕ( ᐛ )ᕗ", category: "action" }, { text: "(╯°□°）╯︵ ┻━┻", category: "action" },
            { text: "┬─┬ノ( º _ ºノ)", category: "action" }, { text: "༼ つ ◕_◕ ༽つ", category: "complex" }, { text: " (づ◡﹏◡)づ", category: "complex" },
            { text: "∠( ᐛ 」∠)＿", category: "action" }, { text: "щ(ºДºщ)", category: "complex" }, { text: "Σ(□_□)", category: "classic" },
            { text: "(´• ω •`)", category: "classic" }, { text: "v_v", category: "minimal" }, { text: "u_u", category: "minimal" },
            { text: "X_X", category: "minimal" }, { text: "O_o", category: "minimal" }, { text: "◖ᵔ◡ᵔ◗", category: "geometry" },
            { text: "ᗒ◡ᗕ", category: "classic" }, { text: "ᗗ◡ᗗ", category: "classic" }, { text: "ʕ•ᴥ•ʔ", category: "complex" }
        ];

        let allKao = [...staticData];

        // Generate masses of variations
        function generateMore() {
            for (let i = 0; i < 400; i++) {
                const eye = symbols.eyes[Math.floor(Math.random() * symbols.eyes.length)];
                const mouth = symbols.mouths[Math.floor(Math.random() * symbols.mouths.length)];
                const armSet = symbols.arms[Math.floor(Math.random() * symbols.arms.length)];
                
                const styles = [
                    `${eye}${mouth}${eye}`,
                    `${armSet[0]}${eye}${mouth}${eye}${armSet[1]}`,
                    `${eye}_${eye}`,
                    `${eye}-${eye}`,
                    `${eye}.${eye}`
                ];
                
                const text = styles[Math.floor(Math.random() * styles.length)];
                
                // Avoid duplicates
                if (!allKao.some(k => k.text === text)) {
                    let cat = "classic";
                    if (text.length <= 3) cat = "minimal";
                    else if (text.includes('◮') || text.includes('◪')) cat = "geometry";
                    else if (text.length > 7) cat = "complex";
                    
                    allKao.push({ text, category: cat });
                }
            }
        }

        generateMore();

        function render(data) {
            const grid = document.getElementById('grid');
            const count = document.getElementById('count');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'kaomoji-card border border-slate-200 rounded-2xl p-6 flex items-center justify-center text-xl font-bold text-slate-800 shadow-sm text-center';
                card.innerText = item.text;
                card.onclick = () => {
                    const el = document.createElement('textarea');
                    el.value = item.text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 1500);
                };
                grid.appendChild(card);
            });
            count.innerText = data.length;
        }

        function filterItems(category, btn) {
            const filtered = category === 'all' ? allKao : allKao.filter(k => k.category === category);
            render(filtered);
            
            document.querySelectorAll('.btn-filter').forEach(b => {
                b.className = 'btn-filter px-5 py-2 bg-slate-100 text-slate-700 rounded-2xl hover:bg-slate-200 transition';
            });
            btn.className = 'btn-filter px-5 py-2 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg transition';
        }

        function search() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allKao.filter(k => k.text.toLowerCase().includes(q));
            render(filtered);
        }

        window.onload = () => render(allKao);
    </script>
</body>
</html>
