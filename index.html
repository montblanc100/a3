<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עולם הפרצופים - Kaomoji להעתקה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f1f5f9;
        }
        .kaomoji-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
        }
        .kaomoji-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #6366f1;
        }
        .kaomoji-card:active {
            transform: scale(0.95);
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .toast.show {
            opacity: 1;
            bottom: 3rem;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <!-- Header -->
    <header class="max-w-5xl mx-auto text-center mb-12">
        <div class="inline-block p-2 px-4 bg-indigo-100 text-indigo-700 rounded-full text-sm font-bold mb-4">
            מעל 150 פרצופים מוכנים!
        </div>
        <h1 class="text-5xl font-extrabold text-slate-900 mb-4">אוסף ה-Kaomoji הגדול ᕙ(`▿´)ᕗ</h1>
        <p class="text-xl text-slate-600">הקליקו על פרצוף כדי להעתיק אותו באופן מיידי</p>
    </header>

    <!-- Navigation & Search -->
    <div class="max-w-5xl mx-auto mb-10 sticky top-4 z-40 bg-white/80 backdrop-blur-md p-4 rounded-2xl shadow-sm border border-slate-200">
        <div class="flex flex-wrap justify-center gap-2 mb-4" id="category-filters">
            <button onclick="filterItems('all', this)" class="filter-btn px-4 py-2 bg-indigo-600 text-white rounded-xl font-bold transition shadow-md">הכל</button>
            <button onclick="filterItems('happy', this)" class="filter-btn px-4 py-2 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">שמח ◕‿◕</button>
            <button onclick="filterItems('love', this)" class="filter-btn px-4 py-2 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">אהבה ♡</button>
            <button onclick="filterItems('sad', this)" class="filter-btn px-4 py-2 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">עצוב (╥﹏╥)</button>
            <button onclick="filterItems('angry', this)" class="filter-btn px-4 py-2 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">כועס ヽ(`д´)נ</button>
            <button onclick="filterItems('surprised', this)" class="filter-btn px-4 py-2 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">מופתע (O_O)</button>
            <button onclick="filterItems('confused', this)" class="filter-btn px-4 py-2 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">מבולבל (ヘ_ヘ)</button>
            <button onclick="filterItems('animal', this)" class="filter-btn px-4 py-2 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">חיות ʕ•ᴥ•ʔ</button>
            <button onclick="filterItems('action', this)" class="filter-btn px-4 py-2 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">פעולות ᕕ( ᐛ )ᕗ</button>
        </div>
        
        <div class="relative max-w-lg mx-auto">
            <input type="text" id="searchInput" oninput="searchKaomoji()" placeholder="חפשו פרצוף או רגש..." class="w-full px-5 py-3 pr-12 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:outline-none transition text-lg">
            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="max-w-6xl mx-auto mb-4 text-slate-500 text-sm px-2">
        נמצאו <span id="count-display" class="font-bold text-indigo-600">0</span> פרצופים
    </div>

    <!-- Grid Container -->
    <main id="kaomoji-grid" class="max-w-6xl mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 pb-20">
        <!-- Content injected via JS -->
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast">הועתק ללוח! 📋</div>

    <script>
        const kaomojiData = [
            // HAPPY
            { text: "◍‿◉", category: "happy" }, { text: "◕‿◕", category: "happy" }, { text: "(^_^) ", category: "happy" }, 
            { text: "(^O^) ", category: "happy" }, { text: "(っ◕‿◕)っ", category: "happy" }, { text: "(๑>ᴗ<๑)", category: "happy" },
            { text: "o(>ω<)o", category: "happy" }, { text: "(*^ω^*)", category: "happy" }, { text: "(´ ∀ ` *)", category: "happy" },
            { text: "٩(◕‿◕)۶", category: "happy" }, { text: "(o^▽^o)", category: "happy" }, { text: "(⌒▽⌒)☆", category: "happy" },
            { text: "<(￣︶￣)>", category: "happy" }, { text: "(✷‿✷)", category: "happy" }, { text: "(.❛ ᴗ ❛.)", category: "happy" },
            { text: "＼(＾▽＾)／", category: "happy" }, { text: "(*¯︶¯*)", category: "happy" }, { text: "(o˘◡˘o)", category: "happy" },
            { text: "╰(▔∀▔)╯", category: "happy" }, { text: "(✯◡✯)", category: "happy" }, { text: "(◕‿◕✿)", category: "happy" },
            { text: "(*^‿^*)", category: "happy" }, { text: "٩(ˊᗜˋ*)ו", category: "happy" }, { text: "( ´ ▽ ` )", category: "happy" },

            // LOVE
            { text: "(♡-_-♡)", category: "love" }, { text: "(❤ω❤)", category: "love" }, { text: "╰(*´︶`*)╯♡", category: "love" },
            { text: "( ´ ∀ `)ノ～ ♡", category: "love" }, { text: "(´｡• ᵕ •｡`) ♡", category: "love" }, { text: "(♡μ_μ)", category: "love" },
            { text: "( ˘⌣˘)♡(˘⌣˘ )", category: "love" }, { text: "♡(>ᴗ•)", category: "love" }, { text: "(灬♥ω♥灬)", category: "love" },
            { text: "(´• ω •`) ♡", category: "love" }, { text: "(/▽＼*)｡o○♡", category: "love" }, { text: "(─‿‿─)♡", category: "love" },
            { text: "Σ(°△°|||)︴", category: "surprised" }, { text: "(❤ε❤)", category: "love" }, { text: "（ʃƪ〃ﾟ◡ﾟ〃）", category: "love" },

            // SAD
            { text: "(;﹏;)", category: "sad" }, { text: "(T_T)", category: "sad" }, { text: "(╥﹏╥)", category: "sad" },
            { text: "(╯_╰)", category: "sad" }, { text: "(´-ω-`)", category: "sad" }, { text: "(-_-)", category: "sad" },
            { text: "(._.)", category: "sad" }, { text: "(o_ _)o", category: "sad" }, { text: "(｡T ω T｡)", category: "sad" },
            { text: "(个_个)", category: "sad" }, { text: "(╯︵╰,)", category: "sad" }, { text: "｡･ﾟﾟ･(>_<)･ﾟﾟ･｡", category: "sad" },
            { text: "(μ_μ)", category: "sad" }, { text: "(ノ﹏ヽ)", category: "sad" }, { text: "（┬┬＿┬┬）", category: "sad" },

            // ANGRY
            { text: "(#`Д´)", category: "angry" }, { text: "(-_-#)", category: "angry" }, { text: "(怒-_-)ノ", category: "angry" },
            { text: "ヽ( `д´*)ノ", category: "angry" }, { text: "(＃｀д´)ﾉ", category: "angry" }, { text: "(‡▼益▼)", category: "angry" },
            { text: "凸(｀△´＋)", category: "angry" }, { text: "＼(〇_ｏ)／", category: "angry" }, { text: "( º皿º )", category: "angry" },
            { text: "ヽ(｀⌒´メ)ノ", category: "angry" }, { text: "凸(｀⌒´メ)凸", category: "angry" }, { text: "（｀Δ´）！", category: "angry" },

            // SURPRISED
            { text: "(o_O)", category: "surprised" }, { text: "(O_O;)", category: "surprised" }, { text: "∑(O_O;)", category: "surprised" },
            { text: "(⊙_⊙)", category: "surprised" }, { text: "(@_@)", category: "surprised" }, { text: "(o_O) !", category: "surprised" },
            { text: "(ﾟДﾟ)", category: "surprised" }, { text: "w(°ｏ°)w", category: "surprised" }, { text: "Σ(□_□)", category: "surprised" },
            { text: "(✿☉｡☉)", category: "surprised" }, { text: "щ(゜ロ゜щ)", category: "surprised" }, { text: "(○.○)", category: "surprised" },

            // CONFUSED / BORED
            { text: "┐(‘～`;)┌", category: "confused" }, { text: "(ヘ_ヘ)", category: "confused" }, { text: "(￢_￢)", category: "confused" },
            { text: "(¬_¬ )", category: "confused" }, { text: "(挑_挑)", category: "confused" }, { text: "╮(￣ω￣;)╭", category: "confused" },
            { text: "(￣ω￣;)", category: "confused" }, { text: "(-_-;)・・・", category: "confused" }, { text: "(・_・;)", category: "confused" },
            { text: "┐(￣ヘ￣)┌", category: "confused" }, { text: "(￣.￣)", category: "confused" }, { text: "(＠_＠)??", category: "confused" },

            // ANIMALS
            { text: "(=^･ω･^=)", category: "animal" }, { text: "(=^･ｪ･^=)", category: "animal" }, { text: "(=①ω①=)", category: "animal" },
            { text: "V●ᴥ●V", category: "animal" }, { text: "(ᵔᴥᵔ)", category: "animal" }, { text: "ʕ •ᴥ•ʔ", category: "animal" },
            { text: "(^._.^)ﾉ", category: "animal" }, { text: "Ƹ̵̡Ӝ̵̨̄Ʒ", category: "animal" }, { text: "/ᐠ｡ꞈ｡ᐟ\\", category: "animal" },
            { text: "(=^-ω-^=)", category: "animal" }, { text: "⊂(￣▽￣)⊃", category: "animal" }, { text: "ʕ ᵔᴥᵔ ʔ", category: "animal" },
            { text: "ᶘ ᵒᴥᵒᶅ", category: "animal" }, { text: "ᓚᘏᗢ", category: "animal" }, { text: "૮ ºﻌº א", category: "animal" },

            // ACTIONS
            { text: "ᕕ( ᐛ )ᕗ", category: "action" }, { text: "ᕙ(`▿´)ᕗ", category: "action" }, { text: "(シ. .)シ", category: "action" },
            { text: "ヽ(ˇ∀ˇ)人(ˇ∀ˇ)ノ", category: "action" }, { text: "( ￣w￣)Ψ", category: "action" }, { text: "（ー_ー）zzZ", category: "action" },
            { text: "(-_-) zzz", category: "action" }, { text: " (－ω－) zzZ", category: "action" }, { text: "ヾ(・ω・)メ(・ω・)ノ", category: "action" },
            { text: "ε=ε=ε=ε=┌(;￣▽￣)┘", category: "action" }, { text: "(*・∀・)爻(・∀・*)", category: "action" }, { text: " (づ◡﹏◡)づ", category: "action" }
        ];

        function renderGrid(data) {
            const grid = document.getElementById('kaomoji-grid');
            const countDisplay = document.getElementById('count-display');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'kaomoji-card bg-white border border-slate-200 rounded-2xl p-6 flex items-center justify-center text-xl font-medium text-slate-800 shadow-sm text-center';
                div.innerText = item.text;
                div.title = "לחץ להעתקה";
                div.onclick = () => copyToClipboard(item.text);
                grid.appendChild(div);
            });
            
            countDisplay.innerText = data.length;
        }

        function copyToClipboard(text) {
            // FIX: Use traditional execCommand for better compatibility in iFrames/restricted environments
            const textArea = document.createElement("textarea");
            textArea.value = text;
            // Ensure textArea is not visible but part of the DOM
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast();
                }
            } catch (err) {
                console.error('שגיאה בהעתקה:', err);
            }
            
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function filterItems(category, btn) {
            const filtered = category === 'all' ? kaomojiData : kaomojiData.filter(item => item.category === category);
            renderGrid(filtered);
            
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                b.classList.add('bg-slate-100', 'text-slate-700');
            });
            btn.classList.remove('bg-slate-100', 'text-slate-700');
            btn.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
        }

        function searchKaomoji() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = kaomojiData.filter(item => 
                item.text.toLowerCase().includes(query) || 
                item.category.toLowerCase().includes(query)
            );
            renderGrid(filtered);
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderGrid(kaomojiData);
        });
    </script>
</body>
</html>
