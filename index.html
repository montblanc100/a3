        .kaomoji-card:hover {

            border-color: #6366f1;
            background-color: #fff;
        }

        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .toast.show {

            kaomojiData.push({ 
                text: base.text + " " + decorations[i % decorations.length], 
                category: base.category 
            });
        }

        function renderGrid(data) {
            const grid = document.getElementById('kaomoji-grid');
            const countDisplay = document.getElementById('count-display');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'kaomoji-card bg-white border border-slate-200 rounded-2xl p-6 flex items-center justify-center text-xl font-medium text-slate-800 shadow-sm text-center';
                div.innerText = item.text;
                div.title = "ЧңЧ—ЧҘ ЧңЧ”ЧўЧӘЧ§Ч”";
                div.onclick = () => copyToClipboard(item.text);
                grid.appendChild(div);
            });
            
            countDisplay.innerText = data.length;
        }

        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast();
                }
            } catch (err) {
                console.error('Ч©Ч’ЧҷЧҗЧ” Ч‘Ч”ЧўЧӘЧ§Ч”:', err);
            }
            
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function filterItems(category, btn) {
            const filtered = category === 'all' ? kaomojiData : kaomojiData.filter(item => item.category === category);
            renderGrid(filtered);
            
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                b.classList.add('bg-slate-100', 'text-slate-700');
            });
            btn.classList.remove('bg-slate-100', 'text-slate-700');
            btn.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
        }

        function searchKaomoji() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = kaomojiData.filter(item => 
                item.text.toLowerCase().includes(query) || 
                item.category.toLowerCase().includes(query)
            );
            renderGrid(filtered);
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderGrid(kaomojiData);
        });
    </script>
</body>
</html>
